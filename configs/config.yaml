# Gray Matter — central config. Nothing hardcoded elsewhere.

paths:
  corpus_raw: "corpus/raw"          # one JSON per document (gitignored)
  corpus_eval: "corpus/eval"
  source_files: "corpus/source_files"

ingest:
  min_doc_chars: 400                 # drop docs shorter than this after cleaning
  openstax_chunk_chars: 1000         # target size per OpenStax chunk (~2-3 paragraphs)

# --- Phase 2: dense retrieval ---
embedding:
  model: "BAAI/bge-small-en-v1.5"    # 384-dim bi-encoder, strong + tiny (~133MB)
  query_prefix: "Represent this sentence for searching relevant passages: "
  batch_size: 128                    # doubled from 64; still safe on 4060, ~10% speedup in wall time
  normalize: true                    # unit vectors -> cosine == dot product

vector_store:
  path: "qdrant_storage"             # embedded Qdrant: a local folder, no server
  collection: "greymatter"
  distance: "Cosine"                 # or "Dot" for 5% more speed (identical ranking with normalized vecs)
  hnsw:
    m: 16                            # neighbors per node; good default for 25k vectors
    ef_construct: 200                # higher = better index, slower build; diminishing past 200
    ef_search: 100                   # lower = faster query with ~1% recall loss (negligible)

# --- Phase 2: answer-time gating ---
# Retrieval always returns top_k chunks however poor the match, so the generator is handed
# confident-looking context even when the corpus cannot answer. If the BEST hit scores below
# min_score, abstain without calling the LLM at all.
#
# Applied in the generator, deliberately NOT in the retriever: hit@k must keep measuring raw
# retrieval quality, and gating there would silently change that number.
#
# RECALIBRATED against the competing objective. The first calibration used eval_set as the
# "answerable" side and picked 0.72 — but eval_set questions were CONSTRUCTED FROM the corpus,
# so they score unusually high (min 0.716). Real hand-written student questions score lower
# ("mechanism of action of NSAIDs" 0.711, "how does chemotherapy target dividing cells" 0.707),
# and 0.72 gated both — pushing proposal criterion 4 (educational wrongly refused <=5%) from
# 3% to 7%, i.e. from pass to fail. The idealised calibration was optimistic exactly as warned.
#
# Re-measured on guardrail EDUCATIONAL (hand-written, realistic) vs abstention_set:
#   threshold   criterion 4        abstention caught by gate
#     0.70      3%  PASS            71%   <- chosen
#     0.71      5%  FAIL            82%
#     0.72      7%  FAIL            89%
#     0.75      16% FAIL            96%
# The gate is not the only line of defence — the model abstains on some questions above the
# threshold too — so trading gate coverage for criterion 4 is the right side of this tradeoff.
# Still revalidate on live traffic. Set to 0.0 to disable.
retrieval:
  min_score: 0.70

# --- Phase 2: generation ---
llm:
  base_url: "http://localhost:11434/v1"  # Ollama's OpenAI-compatible endpoint
  # Apache 2.0 — chosen over qwen2.5:3b, which ships under the Qwen RESEARCH LICENSE.
  # Same rule as the corpus: a license that permits reuse, verified not assumed. The 3B
  # is fine for local experiments but must not be the default a published artifact runs on.
  # Q4_K_M ~4.7GB, fits the 4060's 8.6GB alongside the embedding model.
  model: "qwen2.5:7b"                    # swap for Groq later via base_url+model
  api_key_env: "LLM_API_KEY"             # Ollama ignores auth; set this env var for Groq/hosted
  temperature: 0.1                       # low -> stay grounded, minimal invention
  max_tokens: 700
  top_k: 5                               # retrieved chunks fed as context

security:
  trust_remote_code: false           # HARD RULE — never flip this on
  strip_html_regex: "<[^>]+>"
  # Licenses whose terms permit chunk-and-transform reuse. Anything with -ND is REJECTED.
  accepted_license_slugs: ["cc0", "publicdomain", "by", "by-sa", "by-nc", "by-nc-sa"]
  rejected_license_slugs: ["by-nd", "by-nc-nd", "nd"]

sources:

  # -- OpenStax: a LIST of first-party PDFs. Drop each PDF in corpus/source_files/ --
  # Download links live on each book's page: https://openstax.org/details/books/<slug>
  openstax_books:
    - name: "openstax_ap2e"
      enabled: true
      title: "Anatomy and Physiology 2e"
      license: "CC BY-NC-SA 4.0"
      attribution: "Anatomy and Physiology 2e, OpenStax, CC BY-NC-SA 4.0"
      local_pdf: "corpus/source_files/anatomy_and_physiology_2e_WEB.pdf"
    - name: "openstax_microbiology"
      enabled: true
      title: "Microbiology"
      license: "CC BY 4.0"           # cleanest license of the set
      attribution: "Microbiology, OpenStax, CC BY 4.0"
      local_pdf: "corpus/source_files/microbiology_WEB.pdf"
    - name: "openstax_biology2e"
      enabled: true
      title: "Biology 2e"
      license: "CC BY 4.0"
      attribution: "Biology 2e, OpenStax, CC BY 4.0"
      local_pdf: "corpus/source_files/Biology_2e_WEB.pdf"
    - name: "openstax_fundamentals_nursing"
      enabled: true
      title: "Fundamentals of Nursing"
      license: "CC BY-NC-SA 4.0"
      attribution: "Fundamentals of Nursing, OpenStax, CC BY-NC-SA 4.0"
      local_pdf: "corpus/source_files/Fundamentals_of_Nursing_WEB.pdf"

  medquad:
    enabled: true
    name: "medquad"
    hf_repo: "lavita/MedQuAD"         # license-scrubbed mirror (ADAM/ASHP removed). Do NOT swap for an unlicensed clone.
    revision: "84ea67f83cec9692ad254eaa02c9731b24ecfe4c"  # pinned main @ 2026-07
    license: "NIH public-domain-derived (see lavita/MedQuAD card)"
    attribution: "MedQuAD (Ben Abacha & Demner-Fushman, 2019), via lavita/MedQuAD"
    keep_question_prefixes: ["what is", "what are", "how does", "how do", "what causes", "anatomy of", "what happens"]
    drop_question_keywords: ["dose", "dosage", "how much", "treatment for", "should i take", "side effects of taking"]

  # -- PubMed Central Open Access subset, via the sanctioned E-utilities API --
  # Fills clinical-topic gaps. License is checked PER ARTICLE; -ND is dropped.
  pmc:
    enabled: false                   # opt-in; set an email (NCBI etiquette) then enable
    name: "pmc_oa"
    email: ""                        # REQUIRED by NCBI usage policy — your contact email
    api_key_env: "NCBI_API_KEY"      # optional; raises 3 -> 10 req/s if set in .env
    retmax_per_query: 20             # articles per topic query
    request_delay_s: 0.4             # >=0.34s (3 rps) without key; safe default
    queries:                         # topic-targeted to clinical gaps
      - "myocardial infarction pathophysiology review"
      - "diabetes mellitus type 2 pathophysiology review"
      - "asthma pathophysiology mechanism review"
      - "chronic kidney disease pathophysiology review"

  # -- LibreTexts Medicine: URL-list ingest under a 5s crawl-delay (robots-compliant) --
  libretexts:
    enabled: false                   # opt-in; add specific page URLs, verify each page's license
    name: "libretexts_med"
    license: "CC BY-NC-SA 4.0"       # LibreTexts default; CONFIRM per page footer
    attribution: "LibreTexts Medicine, licensed CC BY-NC-SA 4.0"
    crawl_delay_s: 5                 # required by med.libretexts.org/robots.txt
    urls: []